{{ define "index" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/htmx.org"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>{{ .Title }}</title>
</head>

<body class="h-screen flex flex-col bg-gray-800 text-slate-900">
    <header class="shrink-0 border-b border-gray-800 bg-gray-800 text-white">
        <div class="mx-auto flex items-center justify-between px-6 py-2">
            <div>
                <h1 class="text-xl font-semibold tracking-tight">Operations Dashboard</h1>
            </div>
            <a href="/">TV View</a>
            <a href="/TL">Team Lead View</a>
            <div class="rounded-full bg-green-600 px-3 py-1 text-sm font-medium text-white">
                Live
            </div>
        </div>
    </header>

    <main class="flex-1 min-h-0 flex flex-col w-full gap-1 p-2 bg-gray-600">
        {{ template "content" . }}
    </main>

    <script>
        const header = document.querySelector('header');
        let timer;
        header.classList.add('hidden');
        document.addEventListener('mousemove', () => {
            header.classList.remove('hidden');
            clearTimeout(timer);
            timer = setTimeout(() => header.classList.add('hidden'), 2000);
        });
    </script>
</body>
</html>
{{ end }}
